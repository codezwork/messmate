<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MessMate | Find a Canteen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body class="bg-white text-slate-800 antialiased min-h-screen flex flex-col">
    <nav
      class="bg-white border-b border-orange-100 sticky top-0 z-50 shadow-sm p-4"
    >
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="font-bold text-2xl">
          Mess<span class="text-orange-500">Mate</span>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right">
            <p id="user-display-name" class="text-sm font-bold">Loading...</p>
            <p id="user-display-role" class="text-xs text-slate-500 uppercase">
              Member
            </p>
          </div>
          <button onclick="logout()" class="text-xl">🚪</button>
        </div>
      </div>
    </nav>

    <main id="dashboard-content" class="flex-grow max-w-7xl mx-auto p-8 w-full">
      <!-- Discovery Content Start -->
      <div class="fade-in space-y-6">
        <div class="text-center py-8">
          <h2 class="text-3xl font-bold text-slate-800">Find Your Mess</h2>
          <p class="text-slate-500 mt-2">Discover the best canteens near you</p>
        </div>

        <div class="max-w-2xl mx-auto">
          <input
            type="text"
            placeholder="Search by area, city or mess name..."
            class="w-full p-4 rounded-xl border border-slate-200 shadow-sm focus:border-orange-500 outline-none text-lg"
            oninput="filterDiscoveryList(this.value)"
          />
        </div>

        <div
          id="discovery-list"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8"
        >
          <div class="col-span-full text-center py-10 text-slate-400">
            Loading canteens...
          </div>
        </div>
      </div>
      <!-- Discovery Content End -->
    </main>

    <script>
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      const firebaseConfig = {
        apiKey: "AIzaSyDrIqCctANxbhpOEeiwI5EC2u5F0iKooIU",
        authDomain: "messmateapplication.firebaseapp.com",
        projectId: "messmateapplication",
        storageBucket: "messmateapplication.firebasestorage.app",
        messagingSenderId: "43914417393",
        appId: "1:43914417393:web:6de0bda47db17bae3f0550",
        measurementId: "G-C5SJGPQN98",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
    </script>
    <script src="script.js"></script>
    <script>
      // Start Router on Load
      document.addEventListener("DOMContentLoaded", () => {
        if (Auth && Auth.initRouter) Auth.initRouter();
      });
    </script>
  </body>
</html>
